        required: true
      - name: alt
        type: string
        description: Set to media to download object data. Default is json for metadata.
      outputParameters:
      - type: object
        mapping: $.
    - name: updateobject
      description: Google Cloud Storage Update an object
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: google-cloud-storage.updateobject
      with:
        bucket: tools.bucket
        object: tools.object
      inputParameters:
      - name: bucket
        type: string
        description: bucket
        required: true
      - name: object
        type: string
        description: object
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: deleteobject
      description: Google Cloud Storage Delete an object
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: google-cloud-storage.deleteobject
      with:
        bucket: tools.bucket
        object: tools.object
      inputParameters:
      - name: bucket
        type: string
        description: bucket
        required: true
      - name: object
        type: string
        description: object
        required: true
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    GOOGLE_CLOUD_STORAGE_TOKEN: GOOGLE_CLOUD_STORAGE_TOKEN
