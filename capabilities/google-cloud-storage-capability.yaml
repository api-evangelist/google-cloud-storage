        maxResults: tools.maxResults
        pageToken: tools.pageToken
        prefix: tools.prefix
      inputParameters:
      - name: project
        type: string
        description: A valid API project identifier.
        required: true
      - name: maxResults
        type: integer
        description: Maximum number of buckets to return.
      - name: pageToken
        type: string
        description: A previously-returned page token for pagination.
      - name: prefix
        type: string
        description: Filter results to buckets whose names begin with this prefix.
      outputParameters:
      - type: object
        mapping: $.
    - name: insertbucket
      description: Google Cloud Storage Create a bucket
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-cloud-storage.insertbucket
      with:
        project: tools.project
      inputParameters:
      - name: project
        type: string
        description: A valid API project identifier.
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: getbucket
      description: Google Cloud Storage Get a bucket
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: google-cloud-storage.getbucket
      with:
        bucket: tools.bucket
      inputParameters:
      - name: bucket
        type: string
        description: Name of the bucket.
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: updatebucket
      description: Google Cloud Storage Update a bucket
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: google-cloud-storage.updatebucket
      with:
        bucket: tools.bucket
      inputParameters:
      - name: bucket
        type: string
        description: Name of the bucket.
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: deletebucket
      description: Google Cloud Storage Delete a bucket
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: google-cloud-storage.deletebucket
      with:
        bucket: tools.bucket
      inputParameters:
      - name: bucket
        type: string
        description: Name of the bucket.
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: listobjects
      description: Google Cloud Storage List objects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: google-cloud-storage.listobjects
      with:
        bucket: tools.bucket
        prefix: tools.prefix
        delimiter: tools.delimiter
        maxResults: tools.maxResults
        pageToken: tools.pageToken
      inputParameters:
      - name: bucket
        type: string
        description: Name of the bucket.
        required: true
      - name: prefix
        type: string
        description: Filter results to objects whose names begin with this prefix.
      - name: delimiter
        type: string
        description: Returns results in a directory-like mode.
      - name: maxResults
        type: integer
        description: Maximum number of objects to return.
      - name: pageToken
        type: string
        description: A previously-returned page token for pagination.
      outputParameters:
      - type: object
        mapping: $.
    - name: insertobject
      description: Google Cloud Storage Insert an object
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-cloud-storage.insertobject
      with:
        bucket: tools.bucket
        name: tools.name
      inputParameters:
      - name: bucket
        type: string
        description: Name of the bucket.
        required: true
      - name: name
        type: string
        description: Name of the object.
      outputParameters:
      - type: object
        mapping: $.
    - name: getobject
      description: Google Cloud Storage Get an object
      hints:
        readOnly: true
