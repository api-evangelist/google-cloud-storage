apis:
  - name: Cloud Storage JSON API
    description: >-
      The Cloud Storage JSON API is a RESTful interface for managing data in Google
      Cloud Storage. It allows you to create and manage buckets, upload and download
      objects, manage access controls, and configure lifecycle policies. The API
      supports resumable uploads, object versioning, and customer-managed encryption
      keys for comprehensive cloud storage management.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloud.google.com/storage/docs
    baseURL: https://storage.googleapis.com/storage/v1
