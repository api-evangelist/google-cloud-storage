name: Google Cloud Storage
description: >-
  Google Cloud Storage is a managed service for storing unstructured data such as
  images, videos, backups, and other binary or text objects. It provides a single
  API for accessing both simple storage and highly available, globally redundant
  storage, with automatic data encryption, built-in redundancy, and fine-grained
  access controls.
